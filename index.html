<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sweet Sister 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            animation: floatUp 8s infinite linear;
            z-index: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), inset 0 0 0 2px rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #d13076;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            line-height: 1.2;
        }
        
        p.subtitle {
            color: #555;
            font-size: 1rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            margin-bottom: 25px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.5);
            color: #333;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        input:focus {
            border-color: #ff6a88;
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 106, 136, 0.4);
        }
        input::placeholder { color: #888; }

        button {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 117, 140, 0.6);
        }

    </style>
</head>
<body>
    <!-- Hearts background -->
    <div id="hearts"></div>

    <div class="login-card" id="loginCard">
        <h1>To My World's Best Sister</h1>
        <p class="subtitle">A little surprise just for you... 💝</p>
        <form id="login-form">
            <input type="text" id="love-name" placeholder="Enter your beautiful name">
            <button id="submit-btn" type="submit">Unlock the Magic ✨</button>
        </form>
    </div>

    <script>
        // Floating hearts
        const heartsContainer = document.getElementById('hearts');
        const emojis = ['💖', '✨', '🌸', '💝'];
        for(let i=0; i<30; i++){
            let heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 10 + 5) + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heartsContainer.appendChild(heart);
        }

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const nameInput = document.getElementById('love-name').value.trim();
            
            if (nameInput.toLowerCase() === "nandini") {
                sessionStorage.setItem('globalBGMPlaying', 'true');
                window.location.href = "countdown.html";
            } else {
                alert("Only the world's best sister can enter! 🥺💖");
            }
        });
    </script>
<script src="magic-touch.js"></script>
<script src="global-music.js"></script>
</body>
</html>
