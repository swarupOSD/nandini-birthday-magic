<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Ready...</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            /* Mysterious, luxurious deep violet/midnight blue curtain background */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: curtainBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background-color: #0f0c29;
        }

        @keyframes curtainBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient floating particles for magic */
        .magic-dust {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fcf6ba;
            border-radius: 50%;
            box-shadow: 0 0 10px #fcf6ba, 0 0 20px #bf953f;
            animation: float 4s infinite linear;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        #countdown-container {
            position: relative;
            z-index: 10;
        }

        #countdown-text {
            font-family: 'Dancing Script', cursive;
            font-size: 15rem;
            /* Brilliant Gold Gradient Text */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 0 30px rgba(252, 246, 186, 0.8));
            transform: scale(0.2);
            opacity: 0;
            text-align: center;
            line-height: 1.2;
        }

        .pop-in {
            animation: popText 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes popText {
            0% { transform: scale(0.2); opacity: 0; filter: drop-shadow(0 0 0px rgba(252, 246, 186, 0)); }
            40% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 50px rgba(252, 246, 186, 0.8)); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 30px rgba(252, 246, 186, 0.5)); }
        }

        @media (max-width: 768px) {
            #countdown-text {
                font-size: 8rem;
            }
        }
    </style>
</head>
<body>

    <div id="countdown-container">
        <div id="countdown-text"></div>
    </div>

    <script>
        // Create magic dust particles
        for(let i = 0; i < 40; i++) {
            let dust = document.createElement('div');
            dust.className = 'magic-dust';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.animationDuration = (Math.random() * 3 + 2) + 's';
            dust.style.animationDelay = (Math.random() * 2) + 's';
            document.body.appendChild(dust);
        }

        window.onload = () => {
            const countdownText = document.getElementById('countdown-text');
            const steps = ["3", "2", "1", "Are you ready? ✨"];
            let currentStep = 0;
            
            function animateStep() {
                if (currentStep < steps.length) {
                    countdownText.innerText = steps[currentStep];
                    
                    // Reset animation
                    countdownText.classList.remove('pop-in');
                    void countdownText.offsetWidth; // trigger reflow
                    countdownText.classList.add('pop-in');
                    
                    let baseSize = window.innerWidth < 768 ? "6rem" : "15rem";
                    let finalSize = window.innerWidth < 768 ? "3.5rem" : "7rem";

                    if (currentStep === steps.length - 1) {
                        countdownText.style.fontSize = finalSize;
                    } else {
                        countdownText.style.fontSize = baseSize;
                    }
                    
                    currentStep++;
                    
                    // Wait for 1.2s before next step
                    setTimeout(animateStep, 1200);
                } else {
                    // Redirect to the main heartbeat page!
                    document.body.style.transition = "opacity 0.8s ease";
                    document.body.style.opacity = "0";
                    setTimeout(() => {
                        window.location.href = "main.html?v=magic2";
                    }, 800);
                }
            }
            
            // Start countdown sequence
            setTimeout(animateStep, 500);
        };
    </script>
<script src="magic-touch.js"></script>
<script src="global-music.js"></script>
</body>
</html>
