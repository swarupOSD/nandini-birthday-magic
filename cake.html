<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Cake Celebration!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #ff9a9e;
            --pastel-peach: #fecfef;
            --pastel-blue: #a1c4fd;
            --pastel-rose: #ff6a88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Light Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: rgba(255, 255, 255, 0.4);
            top: 10%; left: 10%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: rgba(255, 182, 193, 0.5);
            bottom: 10%; right: 10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        .stars {
            position: fixed;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px white; }
        }

        .heading {
            font-size: 4.5rem;
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(45deg, #d13076, #ff6a88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
            text-align: center;
            animation: titleFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 2px 4px rgba(255,255,255,0.7));
            position: relative;
            z-index: 2;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .cake-container {
            position: relative;
            width: 350px;
            height: 350px;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 15px 25px rgba(255, 106, 136, 0.3));
        }

        .cake-container:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .cake {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .layer {
            position: absolute;
            width: 100%;
            border-radius: 50% / 20px; /* Makes it look cylindrical */
            box-shadow: inset 0 5px 15px rgba(255, 255, 255, 0.5), 
                        inset 0 -10px 20px rgba(0, 0, 0, 0.15), 
                        0 10px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .layer-1 {
            height: 110px;
            bottom: 0;
            background: linear-gradient(to right, #d84574, #ff85a2, #d84574);
            z-index: 3;
        }

        .layer-2 {
            height: 100px;
            bottom: 95px;
            width: 85%;
            left: 7.5%;
            background: linear-gradient(to right, #e25b86, #ffa1b9, #e25b86);
            z-index: 2;
        }

        .layer-3 {
            height: 90px;
            bottom: 180px;
            width: 70%;
            left: 15%;
            background: linear-gradient(to right, #eb7097, #ffbdd1, #eb7097);
            z-index: 1;
        }

        .frosting {
            position: absolute;
            width: 35px;
            height: 50px;
            background: linear-gradient(to bottom, #fff, #fdfbfb);
            border-radius: 50px;
            top: -20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1), inset -3px -3px 5px rgba(0,0,0,0.05);
            /* Creating an organic drip look */
        }
        
        .frosting:nth-child(even) {
            height: 35px;
            top: -15px;
        }

        .candle {
            position: absolute;
            width: 20px;
            height: 75px;
            background: repeating-linear-gradient(
                -45deg,
                #fff,
                #fff 10px,
                #ff7eb3 10px,
                #ff7eb3 20px
            );
            top: -75px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
            z-index: 10;
            box-shadow: inset -3px 0 5px rgba(0,0,0,0.1), 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .candle::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 12px;
            background: #333;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .flame {
            position: absolute;
            width: 25px;
            height: 45px;
            background: radial-gradient(ellipse at bottom, #fff 10%, #ffeb3b 40%, #ff9800 80%, rgba(255, 152, 0, 0) 100%);
            border-radius: 50% 50% 20% 20%;
            top: -55px;
            left: -2.5px;
            animation: flameFloat 0.8s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #ffeb3b);
            opacity: 1;
        }

        @keyframes flameFloat {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg) scale(1.1); }
        }

        .glow-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(2px);
            animation: particleFloat 3s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }

        .next-page-button {
            position: fixed;
            bottom: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
            z-index: 1000;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .next-page-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 117, 140, 0.6);
        }

        .next-page-button.show {
            opacity: 1 !important;
            transform: translateY(0) !important;
            animation: buttonPulse 1.5s infinite;
        }

        @keyframes buttonPulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.05); }
        }

        @media (max-width: 600px) {
            .title { font-size: 2.5rem; }
            .cake { transform: scale(0.7); }
            .polaroid { padding: 8px 8px 25px 8px; width: 100px; }
            .polaroid img { width: 100%; height: auto; aspect-ratio: 1/1; }
            
            /* Hide lower polaroids on small screens to prevent crowding */
            .p1 { left: 5%; top: 55%; }
            .p2 { right: 5%; top: 55%; }
            .p3, .p4 { display: none; }
        }.floating-gallery {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .polaroid {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 12px 35px 12px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            animation: floatPolaroid 8s ease-in-out infinite alternate;
            pointer-events: auto;
        }

        .polaroid img {
            width: 100%;
            height: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
        }

        .p1 { top: 12%; left: 6%; --rot: -12deg; animation-delay: 0s; }
        .p2 { top: 60%; left: 10%; --rot: 8deg; animation-delay: -3s; }
        .p3 { top: 15%; right: 6%; --rot: 10deg; animation-delay: -1s; }
        .p4 { top: 58%; right: 9%; --rot: -6deg; animation-delay: -4s; }

        @keyframes floatPolaroid {
            0% { transform: translateY(0) rotate(var(--rot)); }
            100% { transform: translateY(-30px) rotate(var(--rot)); }
        }

        @media (max-width: 900px) {
            .polaroid { transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="stars"></div>
    
    <!-- Floating Gallery for Photos and Videos -->
    <div class="floating-gallery">
        <div class="polaroid p1">
            <img src="cake1.jpeg" alt="Photo 1" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
        <div class="polaroid p2">
            <img src="cake2.jpeg" alt="Photo 2" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
        <div class="polaroid p3">
            <img src="cake3.jpeg" alt="Photo 3" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
        <div class="polaroid p4">
            <img src="pic1.jpeg" alt="Photo 4" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
    </div>

    <h1 class="heading">A Sweet Cake For You 🎂</h1>
    <div class="cake-container">
        <div class="cake">
            <div class="layer layer-1">
                <div class="frosting" style="left: 10%"></div>
                <div class="frosting" style="left: 30%"></div>
                <div class="frosting" style="left: 50%"></div>
                <div class="frosting" style="left: 70%"></div>
                <div class="frosting" style="left: 90%"></div>
            </div>
            <div class="layer layer-2">
                <div class="frosting" style="left: 15%"></div>
                <div class="frosting" style="left: 45%"></div>
                <div class="frosting" style="left: 75%"></div>
            </div>
            <div class="layer layer-3">
                <div class="frosting" style="left: 20%"></div>
                <div class="frosting" style="left: 50%"></div>
                <div class="frosting" style="left: 80%"></div>
                <div class="candle">
                    <div class="flame"></div>
                </div>
            </div>
        </div>
    </div>
    <button class="next-page-button">Blow the Candle 🌬️</button>

    <script>
        function createStars() {
            const container = document.querySelector('.stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = `${Math.random() * 4}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                container.appendChild(star);
            }
        }

        function createParticles() {
            const flame = document.querySelector('.flame');
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'glow-particle';
                particle.style.left = `${Math.random() * 20 - 10}px`;
                flame.appendChild(particle);
                setTimeout(() => particle.remove(), 3000);
            }, 400);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cake = document.querySelector('.cake-container');
            const nextButton = document.querySelector('.next-page-button');
            let celebrationStarted = false;

            cake.addEventListener('click', () => {
                if(celebrationStarted) return;
                celebrationStarted = true;

                // Animate flame growing slightly
                gsap.to('.flame', { scale: 1.5, duration: 1, ease: 'elastic.out(1, 0.3)' });

                setTimeout(() => {
                    nextButton.classList.add('show');
                }, 1000);
            });

            nextButton.addEventListener('click', () => {
                // Lower BGM volume
                if(window.setBGMVolume) window.setBGMVolume(0.2);

                // Play cheer/happy birthday sound loud!
                let cheerSound = window.cheerAudio;
                if(!cheerSound) {
                   cheerSound = new Audio('cheer.mp3');
                   window.cheerAudio = cheerSound;
                }
                cheerSound.volume = 1.0;
                cheerSound.play().catch(e => console.log('Cheer audio failed'));

                setInterval(() => {
                    sessionStorage.setItem('cheerMusicTime', cheerSound.currentTime);
                    sessionStorage.setItem('cheerMusicPlaying', 'true');
                }, 100);

                // Blow out the candle flame!
                gsap.to('.flame', { opacity: 0, scale: 0, duration: 0.3 });
                
                // Add magic overlay if not exists
                if(!document.querySelector('.magic-overlay')) {
                    const overlay = document.createElement('div');
                    overlay.className = 'magic-overlay';
                    overlay.style.position = 'fixed';
                    overlay.style.top = '0'; overlay.style.left = '0';
                    overlay.style.width = '100vw'; overlay.style.height = '100vh';
                    overlay.style.background = 'white';
                    overlay.style.opacity = '0';
                    overlay.style.zIndex = '9999';
                    overlay.style.pointerEvents = 'none';
                    document.body.appendChild(overlay);
                }
                
                gsap.to('.magic-overlay', {
                    opacity: 1,
                    duration: 1,
                    onComplete: () => {
                        window.location.href = 'birthday-main.html?v=magic2';
                    }
                });
            });

            createStars();
            createParticles();
        });
    </script>
<script src="magic-touch.js"></script>
<script src="global-music.js"></script>
</body>
</html>
