<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Sister by Snehashis Roy</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ff0844, #ffb199, #ff7eb3, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Light Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: rgba(236, 72, 153, 0.4);
            top: 10%; left: 10%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: rgba(56, 189, 248, 0.3);
            bottom: 10%; right: 10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-50px) scale(1.1); }
        }

        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #petalsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .birthday-text {
            color: #fcf6ba;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 20px rgba(252, 246, 186, 0.8);
            text-align: center;
            position: absolute;
            width: 100%;
            z-index: 10;
            font-weight: 700;
            white-space: nowrap;
            font-size: 100px;
            font-family: 'Dancing Script', cursive;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        .romantic-message {
            font-family: 'Poppins', sans-serif;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
            width: 80%;
            max-width: 600px;
        }

        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart {
            position: absolute;
            width: 30px;
            height: 30px;
            opacity: 0;
            transform: scale(0);
        }

        .birthday-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .celebrate-button {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            padding: 15px 40px;
            border-radius: 50px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            color: #4a0000;
            font-weight: 600;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0;
            box-shadow: 0 5px 15px rgba(191, 149, 63, 0.5),
                        0 0 30px rgba(252, 246, 186, 0.3),
                        inset 0 0 10px rgba(255, 255, 255, 0.3);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .celebrate-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s ease;
        }

        .celebrate-button:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 7px 25px rgba(255, 45, 105, 0.7),
                        0 0 40px rgba(255, 45, 105, 0.5),
                        inset 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .celebrate-button:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .celebrate-button:active {
            transform: translateX(-50%) scale(0.98);
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .glow-effect {
            animation: pulse 2s infinite ease-in-out;
        }

        @media screen and (max-width: 768px) {
            .birthday-text {
                font-size: 3.5rem;
                width: 100%;
                padding: 0 20px;
            }
            
            .romantic-message {
                font-size: 1rem;
                top: 65%;
            }
            
            .celebrate-button {
                bottom: 15%;
                padding: 12px 30px;
                font-size: 16px;
            }
        }

        @media screen and (max-width: 480px) {
            .birthday-text {
                font-size: 2.5rem;
            }
            
            .romantic-message {
                font-size: 0.9rem;
                width: 90%;
            }
            
            .celebrate-button {
                bottom: 10%;
                padding: 10px 25px;
                font-size: 14px;
            }
        }
        .next-page-button {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            color: #4a0000;
            font-weight: 600;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            box-shadow: 0 5px 15px rgba(191, 149, 63, 0.5),
                        0 0 30px rgba(252, 246, 186, 0.3),
                        inset 0 0 10px rgba(255, 255, 255, 0.3);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .next-page-button:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 25px rgba(255, 45, 105, 0.7),
                        0 0 40px rgba(255, 45, 105, 0.5),
                        inset 0 0 15px rgba(172, 154, 154, 0.4);
        }
    
        .next-page-button:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="background"></div>
    <canvas id="starCanvas"></canvas>
    <canvas id="petalsCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>
    <div class="hearts-container" id="heartsContainer"></div>
    
    <div class="birthday-container">
        <h1 class="birthday-text text-6xl">Happy Birthday, Bunu</h1>
        <p class="romantic-message">Every moment with you is a celebration, but today is especially magical. Here's to another year of love, laughter, and countless beautiful memories together.</p>
        <button class="celebrate-button" id="celebrateBtn">Celebrate Our Love</button>
        <button class="next-page-button" id="nextPageBtn" onclick="window.location.href='album.html'">Next</button>
    </div>

    <script>        // Canvas elements
        const starCanvas = document.getElementById('starCanvas');
        const starCtx = starCanvas.getContext('2d');
        const fireworksCanvas = document.getElementById('fireworksCanvas');
        const fireworksCtx = fireworksCanvas.getContext('2d');
        const petalsCanvas = document.getElementById('petalsCanvas');
        const petalsCtx = petalsCanvas.getContext('2d');
        const heartsContainer = document.getElementById('heartsContainer');

        // Set canvas size
        function resizeCanvas() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
            petalsCanvas.width = window.innerWidth;
            petalsCanvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Star class for twinkling stars
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * starCanvas.width;
                this.y = Math.random() * starCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.maxSize = this.size + Math.random() * 2;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.glowFactor = Math.random() * 15 + 5;
                this.speed = Math.random() * 0.05 + 0.01;
                this.growing = Math.random() > 0.5;
                this.color = {
                    r: 255,
                    g: Math.floor(Math.random() * 100) + 155,
                    b: Math.floor(Math.random() * 155) + 100
                };
            }
            
            update() {
                if (this.growing) {
                    this.size += this.speed;
                    if (this.size >= this.maxSize) {
                        this.growing = false;
                    }
                } else {
                    this.size -= this.speed;
                    if (this.size <= 0.5) {
                        this.reset();
                    }
                }
            }
            
            draw() {
                starCtx.beginPath();
                starCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                starCtx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`;
                starCtx.fill();
                
                // Add glow
                starCtx.shadowBlur = this.glowFactor;
                starCtx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 1)`;
            }
        }

        // Petal class for falling petals
        class Petal {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * petalsCanvas.width;
                this.y = -20 - Math.random() * 100;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
                this.opacity = Math.random() * 0.5 + 0.5;
                
                const colors = ['#ff7eb3', '#ff65a3', '#ff4d85', '#ff99c4'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5;
                this.rotation += this.rotationSpeed;
                
                if (this.y > petalsCanvas.height + 20) {
                    this.reset();
                }
            }
            
            draw() {
                petalsCtx.save();
                petalsCtx.translate(this.x, this.y);
                petalsCtx.rotate(this.rotation * Math.PI / 180);
                
                petalsCtx.beginPath();
                // Draw petal shape (teardrop)
                petalsCtx.moveTo(0, 0);
                petalsCtx.quadraticCurveTo(this.size, this.size, 0, this.size * 2);
                petalsCtx.quadraticCurveTo(-this.size, this.size, 0, 0);
                
                petalsCtx.fillStyle = this.color;
                petalsCtx.globalAlpha = this.opacity;
                petalsCtx.fill();
                
                petalsCtx.restore();
            }
        }

        // Firework particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.friction = 0.95;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.alpha -= this.decay;
            }
            
            draw() {
                fireworksCtx.save();
                fireworksCtx.globalAlpha = this.alpha;
                fireworksCtx.beginPath();
                fireworksCtx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                fireworksCtx.fillStyle = this.color;
                fireworksCtx.fill();
                fireworksCtx.shadowBlur = 10;
                fireworksCtx.shadowColor = this.color;
                fireworksCtx.restore();
            }
        }

        // Firework rocket class
        class Firework {
            constructor() {
                this.x = Math.random() * fireworksCanvas.width;
                this.y = fireworksCanvas.height;
                this.targetX = this.x + (Math.random() - 0.5) * 200;
                this.targetY = Math.random() * (fireworksCanvas.height / 2);
                
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                this.vx = (dx / distance) * 8;
                this.vy = (dy / distance) * 8;
                
                this.particles = [];
                this.exploded = false;
                
                const colors = ['#ff0000', '#ff7eb3', '#ffea00', '#00ffea', '#b700ff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    if (this.vy >= 0 || this.y <= this.targetY) {
                        this.explode();
                    }
                } else {
                    for (let i = 0; i < this.particles.length; i++) {
                        this.particles[i].update();
                        if (this.particles[i].alpha <= 0) {
                            this.particles.splice(i, 1);
                            i--;
                        }
                    }
                }
            }
            
            explode() {
                this.exploded = true;
                
                // Play pop sound (optional)
                
                for (let i = 0; i < 50; i++) {
                    this.particles.push(new Particle(this.x, this.y, this.color));
                }
                
                // Sometimes create a heart-shaped firework
                if (Math.random() > 0.7) {
                    this.createHeartExplosion();
                }
            }
            
            createHeartExplosion() {
                for (let i = 0; i < Math.PI * 2; i += 0.1) {
                    // Heart shape parametric equation
                    const x = 16 * Math.pow(Math.sin(i), 3);
                    const y = -(13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
                    
                    const p = new Particle(this.x, this.y, '#ff3377');
                    
                    // Override velocity based on heart shape
                    const scale = 0.15;
                    p.vx = x * scale;
                    p.vy = y * scale;
                    
                    this.particles.push(p);
                }
            }
            
            draw() {
                if (!this.exploded) {
                    fireworksCtx.save();
                    fireworksCtx.beginPath();
                    fireworksCtx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    fireworksCtx.fillStyle = '#ffffff';
                    fireworksCtx.fill();
                    fireworksCtx.restore();
                } else {
                    for (let i = 0; i < this.particles.length; i++) {
                        this.particles[i].draw();
                    }
                }
            }
        }

        // Initialize arrays
        const stars = [];
        for (let i = 0; i < 200; i++) stars.push(new Star());
        
        const petals = [];
        for (let i = 0; i < 50; i++) petals.push(new Petal());
        
        const fireworks = [];
        let fireworksInterval;
        let heartFireworksInterval;

        // Add a new firework
        function addFirework() {
            fireworks.push(new Firework());
        }

        // Add floating hearts using DOM
        function addFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = `${Math.random() * 90 + 5}%`;
            heart.style.top = `${Math.random() * 90 + 5}%`;
            heart.innerHTML = `
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" 
                          fill="rgba(255, ${Math.random() * 100}, ${Math.random() * 100}, ${Math.random() * 0.4 + 0.6})"/>
                </svg>
            `;
            heartsContainer.appendChild(heart);
            
            // Animate heart
            gsap.to(heart, {
                opacity: 1,
                scale: 1,
                duration: 0.5,
                ease: "elastic.out(1, 0.3)",
                onComplete: () => {
                    gsap.to(heart, {
                        y: -100 - Math.random() * 100,
                        x: (Math.random() - 0.5) * 100,
                        opacity: 0,
                        rotation: Math.random() * 60 - 30,
                        scale: 0.5,
                        duration: 4 + Math.random() * 4,
                        ease: "power1.out",
                        onComplete: () => {
                            heart.remove();
                        }
                    });
                }
            });
        }

        // Animate stars
        function animateStars() {
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            requestAnimationFrame(animateStars);
        }

        // Animate petals
        function animatePetals() {
            petalsCtx.clearRect(0, 0, petalsCanvas.width, petalsCanvas.height);
            
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });
            
            requestAnimationFrame(animatePetals);
        }

        // Animate fireworks
        function animateFireworks() {
            fireworksCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            fireworksCtx.fillRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
            
            for (let i = 0; i < fireworks.length; i++) {
                fireworks[i].update();
                fireworks[i].draw();
                
                if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
                    fireworks.splice(i, 1);
                    i--;
                }
            }
            
            requestAnimationFrame(animateFireworks);
        }

        // Start fireworks animation
        function startFireworks() {
            // Regular fireworks
            fireworksInterval = setInterval(addFirework, 500);
            setTimeout(() => {
                clearInterval(fireworksInterval);
            }, 5000);
            
            // Heart fireworks
            heartFireworksInterval = setInterval(addFloatingHeart, 300);
            setTimeout(() => {
                clearInterval(heartFireworksInterval);
            }, 4000);
        }

        // Initialize the page
        function initBirthday() {
            // Set up initial state
            gsap.set('.birthday-text', { opacity: 0, scale: 0.5 });
            gsap.set('.celebrate-button', { opacity: 0, y: 50 });      
            animateStars();
            animatePetals();
            animateFireworks();
            startFireworks();
            
            // Split text for animation
            const birthdayText = document.querySelector('.birthday-text');
            const text = birthdayText.textContent;
            birthdayText.textContent = '';
            
            for (let i = 0; i < text.length; i++) {
                const letter = document.createElement('span');
                letter.textContent = text[i];
                letter.className = 'letter';
                birthdayText.appendChild(letter);
            }
            
            // Start text animation after 3 seconds
            setTimeout(() => {
                birthdayText.style.opacity = 1;
                
                // Animate each letter
                const letters = document.querySelectorAll('.letter');
                letters.forEach((letter, index) => {
                    gsap.to(letter, {
                        opacity: 1,
                        y: 0,
                        delay: 3 + index * 0.1,
                        duration: 0.6,
                        ease: "back.out(1.7)"
                    });
                });
                
                // Animate the whole text with glow
                gsap.to(birthdayText, {
                    textShadow: "0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 123, 172, 0.4)",
                    delay: 3 + text.length * 0.1 + 0.3,
                    duration: 1.5
                });
                
                // Animate button appearance
                const celebrateBtn = document.getElementById('celebrateBtn');
                gsap.to(celebrateBtn, {
                    opacity: 1,
                    scale: 1,
                    delay: 3 + text.length * 0.1 + 1,
                    duration: 0.8,
                    ease: "elastic.out(1, 0.3)"
                });
                
                // Add button effects
                let hoverEffect = 0;
                celebrateBtn.addEventListener('mouseenter', () => {
                    hoverEffect = (hoverEffect + 1) % 3;
                    
                    switch(hoverEffect) {
                        case 0: // Glow effect
                            gsap.to(celebrateBtn, {
                                boxShadow: "0 7px 25px rgba(255, 123, 172, 0.8), 0 0 40px rgba(255, 123, 172, 0.6)",
                                duration: 0.4
                            });
                            break;
                        case 1: // Bounce effect
                            gsap.to(celebrateBtn, {
                                y: -10,
                                duration: 0.4,
                                yoyo: true,
                                repeat: 1,
                                ease: "power2.inOut"
                            });
                            break;
                        case 2: // Scale-up effect
                            gsap.to(celebrateBtn, {
                                scale: 1.1,
                                duration: 0.4,
                                ease: "power1.out"
                            });
                            break;
                    }
                });
                
                celebrateBtn.addEventListener('mouseleave', () => {
                    gsap.to(celebrateBtn, {
                        boxShadow: "0 5px 15px rgba(255, 123, 172, 0.4), 0 0 20px rgba(255, 123, 172, 0.2)",
                        y: 0,
                        scale: 1,
                        duration: 0.4
                    });
                });

                const nextPageBtn = document.getElementById('nextPageBtn');
                gsap.to(nextPageBtn, {
                    opacity: 1,
                    delay: 3 + text.length * 0.1 + 1.5,
                    duration: 0.8,
                    ease: "elastic.out(1, 0.3)"
                });
                
                celebrateBtn.addEventListener('click', () => {
                    // Add click effect
                    gsap.to(celebrateBtn, {
                        scale: 0.95,
                        duration: 0.1,
                        onComplete: () => {
                            // For demo purposes, restart animations
                            startFireworks();
                            gsap.to(celebrateBtn, {
                                scale: 1,
                                duration: 0.5,
                                ease: "elastic.out(1, 0.3)"
                            });
                        }
                    });
                });
            }, 3000);
        }
        
        // Run immediately if loaded normally, or wait for SPA
        if(document.readyState === 'complete' || document.readyState === 'interactive') {
            initBirthday();
        } else {
            window.addEventListener('DOMContentLoaded', initBirthday);
        }

        // Resume cheer music if playing
        function resumeCheerMusic() {
            if (sessionStorage.getItem('cheerMusicPlaying') === 'true') {
                if(window.setBGMVolume) window.setBGMVolume(0.2);

                let savedTime = parseFloat(sessionStorage.getItem('cheerMusicTime') || 0);
                if(!window.cheerAudio) {
                    window.cheerAudio = new Audio('cheer.mp3');
                }
                let cheer = window.cheerAudio;
                cheer.currentTime = savedTime;
                cheer.volume = 1.0;
                cheer.loop = true;
                
                cheer.addEventListener('timeupdate', () => {
                    sessionStorage.setItem('cheerMusicTime', cheer.currentTime);
                });
                
                cheer.play().catch(e => {
                    const tryPlay = () => { cheer.play(); document.body.removeEventListener('click', tryPlay); };
                    document.body.addEventListener('click', tryPlay);
                });
            }
        }
        
        resumeCheerMusic();

        document.getElementById('nextPageBtn').addEventListener('click', () => {
            sessionStorage.removeItem('cheerMusicPlaying');
            window.location.href = 'album.html';
        });
</script>
<script src="magic-touch.js"></script>
<script src="global-music.js"></script>
</body>
</html>
