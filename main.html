<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff0844, #ffb199, #ff7eb3, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Golden Sparkles */
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #fff 0%, #fcf6ba 50%, transparent 100%);
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 15px #fcf6ba; }
        }

        /* Floating Gallery (Premium Glass) */
        .floating-gallery {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .polaroid {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 12px 35px 12px;
            border-radius: 15px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            animation: floatPolaroid 10s ease-in-out infinite alternate;
            pointer-events: auto;
        }

        .polaroid img, .polaroid video {
            width: 100%;
            height: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            object-position: center 15%;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.1);
        }

        .p1 { top: 12%; left: 6%; --rot: -12deg; animation-delay: 0s; }
        .p2 { top: 60%; left: 10%; --rot: 8deg; animation-delay: -3s; }
        .p3 { top: 15%; right: 6%; --rot: 10deg; animation-delay: -1s; }
        .p4 { top: 58%; right: 9%; --rot: -6deg; animation-delay: -4s; }

        @keyframes floatPolaroid {
            0% { transform: translateY(0) rotate(var(--rot)); }
            100% { transform: translateY(-40px) rotate(var(--rot)); }
        }

        /* Beating Heart */
        .heart-wrapper {
            position: absolute;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .beating-heart {
            position: relative;
            width: 120px;
            height: 110px;
            animation: heartbeat 1.5s infinite;
            cursor: pointer;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.6));
            margin-bottom: 30px;
            transition: transform 0.3s;
        }

        .beating-heart:hover {
            transform: scale(1.1);
        }

        .beating-heart::before,
        .beating-heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 60px;
            height: 90px;
            border-radius: 60px 60px 0 0;
            background: linear-gradient(45deg, #fff, #fcf6ba);
            box-shadow: inset 0 0 20px rgba(255, 106, 136, 0.5);
        }
        .beating-heart::before {
            left: 60px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .beating-heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); filter: drop-shadow(0 0 50px #fff); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); filter: drop-shadow(0 0 40px #fff); }
            60%, 100% { transform: scale(1); }
        }

        .instruction {
            color: #fff;
            font-size: 1.8rem;
            font-family: 'Dancing Script', cursive;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: pulseText 2s infinite;
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 5px 20px rgba(255,255,255,0.8); }
        }

        /* Premium Message Card */
        .message-container {
            display: none;
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 60px 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 0 0 2px rgba(255, 255, 255, 0.4);
            max-width: 90%;
            width: 480px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            /* Gold gradient text */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            line-height: 1.2;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        p.sweet-text {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        button {
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            /* Gold gradient button */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            border: none;
            border-radius: 50px;
            color: #4a0000;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(191, 149, 63, 0.5);
            transition: all 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(191, 149, 63, 0.8);
            background: linear-gradient(to right, #fcf6ba, #bf953f, #fcf6ba);
        }

        /* Golden Confetti Particles */
        .gold-particle {
            position: absolute;
            background: radial-gradient(circle, #fcf6ba 0%, #bf953f 100%);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 10px #fcf6ba;
        }

        @media (max-width: 900px) {
            .polaroid { transform: scale(0.8); }
        }
        @media (max-width: 600px) {
            /* .p2, .p4 hidden removed */
            .polaroid { padding: 8px 8px 25px 8px; opacity: 0.8; width: 110px; }
            .polaroid img, .polaroid video { width: 100%; height: auto; aspect-ratio: 1/1; }
            .p1 { top: 5%; left: 2%; --rot: -15deg; }
            .p3 { top: 5%; right: 2%; --rot: 15deg; }
            h1 { font-size: 3.5rem; }
            .message-container { padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <!-- Floating Gallery for Photos and Videos -->
    <div class="floating-gallery">
        <div class="polaroid p1">
            <img src="main1.jpeg" alt="Photo 1" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
        <div class="polaroid p2">
            <img src="main2.jpeg" alt="Photo 2" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
        <div class="polaroid p3">
            <img src="main3.jpeg" alt="Photo 3" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
        <div class="polaroid p4">
            <img src="main4.jpeg" alt="Photo 4" onerror="this.src='https://via.placeholder.com/160?text=Your+Photo'">
        </div>
    </div>

    <!-- The Beating Heart Reveal -->
    <div class="heart-wrapper" id="heartBox">
        <div class="beating-heart"></div>
        <div class="instruction">Tap the heart... ✨</div>
    </div>

    <!-- The Premium Message Card -->
    <div class="message-container" id="messageBox">
        <h1>Happy Birthday, Nandini!</h1>
        <p class="sweet-text">To the world's most breathtaking sister...<br>Amar pran, amar shob! 💖</p>
        <button id="nextBtn">Unlock the Magic ✨</button>
    </div>

    <script>
        // Create Golden Background Sparkles
        for(let i = 0; i < 50; i++) {
            let sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.width = Math.random() * 3 + 2 + 'px';
            sparkle.style.height = sparkle.style.width;
            sparkle.style.animationDelay = Math.random() * 3 + 's';
            sparkle.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(sparkle);
        }

        const heartBox = document.getElementById('heartBox');
        const messageBox = document.getElementById('messageBox');
        const nextBtn = document.getElementById('nextBtn');

        function fireGoldenExplosion() {
            for(let i = 0; i < 150; i++) {
                let p = document.createElement('div');
                p.className = 'gold-particle';
                p.style.left = '50%';
                p.style.top = '50%';
                
                // Varied sizes
                let size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                
                document.body.appendChild(p);

                gsap.to(p, {
                    x: (Math.random() - 0.5) * (window.innerWidth + 200),
                    y: (Math.random() - 0.5) * (window.innerHeight + 200),
                    duration: Math.random() * 1.5 + 1,
                    ease: 'power4.out',
                    opacity: 0,
                    onComplete: () => p.remove()
                });
            }
        }

        heartBox.addEventListener('click', () => {
            // Explode the heart!
            gsap.to(heartBox, {
                scale: 0,
                opacity: 0,
                duration: 0.3,
                ease: "back.in(2)",
                onComplete: () => {
                    heartBox.style.display = 'none';
                    messageBox.style.display = 'block';
                    fireGoldenExplosion();
                    
                    // Elegantly fade in the premium card
                    gsap.fromTo(messageBox, 
                        { scale: 0.8, opacity: 0, y: 30 },
                        { scale: 1, opacity: 1, y: 0, duration: 1.2, ease: "elastic.out(1, 0.7)" }
                    );
                }
            });
        });

        nextBtn.addEventListener('click', () => {
            // Elegant exit animation
            gsap.to(messageBox, {
                scale: 0.9,
                opacity: 0,
                y: -50,
                duration: 0.6,
                ease: "power2.in",
                onComplete: () => {
                    window.location.href = 'cake.html?v=magic2';
                }
            });
        });
    </script>
<script src="magic-touch.js"></script>
<script src="global-music.js"></script>
</body>
</html>
